<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Shared Switch</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
</head>
<body>

<div id="bg">
    <button id="btn" onclick="changeColor()">Light Switch</button>
</div>



<script>
    async function changeColor() {
        let response1 = await fetch("/color");
        let data1 = await response1.json();

        let color;

        if (data1.color === "#eee") {
            color = "#000";
        } else {
            color = "#eee";
        }

        await fetch("/color", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({color: color})
        });
    }


    async function loadColor() {
        let response = await fetch("/color")
        let data = await response.json();
        let box = document.getElementById("bg");
        box.style.background = data.color;
    }
    loadColor();
    setInterval(loadColor, 200);

</script>
</body>
</html>
